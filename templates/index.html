<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dance Mashup Studio</title>
<link rel="stylesheet" href="/static/style.css">
<style id="SEGMENT_SWAP_PANEL_V1">
.timeline-seg { cursor: pointer; position: relative; transition: opacity .15s; }
.timeline-seg:hover { opacity: 0.75; outline: 2px solid #fff4; }
.timeline-seg.active {
  box-shadow: inset 0 0 0 2px #fff, 0 0 10px #fff8;
  z-index: 2;
}
.swap-panel {
  /* PANEL_DOCK_V1 + THREE_COL_V1 */
  flex: 0 1 620px;
  max-height: 70vh;
  background: var(--bg1, #1a1d24); border: 1px solid #444;
  border-radius: 8px; box-shadow: 0 8px 32px #000a; padding: 14px;
  overflow-y: auto; font-size: 0.85rem;
  display: none; text-align: left;
  position: relative;
}
.swap-panel-body {
  display: flex; gap: 12px; align-items: flex-start;
  margin-top: 6px;
}
.swap-preview-col, .swap-cands-col {
  flex: 1 1 0; min-width: 0;
}
.swap-preview {
  width: 100%; max-height: none; aspect-ratio: 9 / 16;
  object-fit: contain;
}
@media (max-width: 980px) {
  .swap-panel-body { flex-direction: column; }
  .swap-preview { aspect-ratio: auto; max-height: 180px; }
}
.swap-panel.show { display: block; }
.swap-panel h4 { margin: 0 0 6px; font-size: 0.9rem; }
.swap-panel .sub { color: var(--fg2, #888); font-size: 0.75rem; margin-bottom: 10px; }
.swap-cand {
  padding: 7px 9px; margin: 6px 0; border-radius: 5px;
  background: #0002; border: 1px solid transparent; cursor: pointer;
  transition: border-color .1s;
}
.swap-cand:hover { border-color: #679; }
.swap-cand.selected { border-color: #4af; background: #4af2; }
/* BATCH_PREVIEW_V1 */
.swap-cand.queued::after {
  content: '★'; color: #ffb74d; margin-left: 6px; font-size: 0.9em;
}
.timeline-seg.queued {
  outline: 2px solid #ffb74d;
  outline-offset: -2px;
}
.swap-preview {
  width: 100%; max-height: 180px; background: #000;
  border-radius: 4px; margin: 8px 0; display: none;
}
.swap-preview.show { display: block; }
.swap-actions-row {
  display: flex; gap: 6px; align-items: center;
  flex-wrap: wrap; margin-top: 6px;
}
.swap-queue-count { color: #ffb74d; font-weight: 600; }
.swap-cand.current { border-left: 3px solid #fc0; }
.swap-cand .row1 { display: flex; justify-content: space-between; align-items: center; }
.swap-cand .vname { font-weight: 600; }
.swap-cand .score { color: var(--fg2, #888); font-size: 0.75rem; }
.swap-cand .heatmap {
  display: flex; gap: 1px; height: 10px; margin-top: 5px;
  background: #0004; border-radius: 2px; overflow: hidden;
}
.swap-cand .heatmap .cell { flex: 1; min-width: 2px; }
.swap-panel .actions { display: flex; gap: 8px; margin-top: 12px; }
.swap-panel .close {
  position: absolute; top: 8px; right: 10px; cursor: pointer;
  color: var(--fg2, #888); font-size: 1.2rem; border: 0; background: transparent;
}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div>
      <h1>Dance Mashup Studio</h1>
      <div class="subtitle" data-i18n="subtitle">匯入多個舞蹈影片，自動卡拍剪輯混搭</div>
    </div>
    <button class="btn lang-toggle" onclick="toggleLang()" id="btnLang">EN</button>
  </div>
</div>

<!-- Quick Generate Bar -->
<div class="quick-bar">
  <div class="quick-inner">
    <!-- PERSON_DROPDOWN_V1 -->
    <div class="quick-field">
      <label data-i18n="qg_person">人物名稱</label>
      <div style="display:flex; gap:6px;">
        <select id="qgGroup" style="flex:1; min-width:110px;" onchange="onGroupChange()">
          <option value="" disabled selected data-i18n="qg_pick_group">選擇團體</option>
        </select>
        <select id="qgMember" style="flex:1; min-width:110px;" disabled>
          <option value="" disabled selected data-i18n="qg_pick_member">選擇成員</option>
        </select>
      </div>
      <input type="hidden" id="qgPerson" value="">
    </div>
    <div class="quick-field">
      <!-- SONG_REFRESH_BTN_V1 -->
      <label data-i18n="qg_song" style="display:flex; justify-content:space-between; align-items:center;">
        <span data-i18n="qg_song">曲目名稱</span>
        <button type="button" id="btnRefreshSongs" onclick="refreshSongLibrary()"
                title="從 iTunes 重新抓取最新曲目"
                data-i18n-title="qg_refresh_title"
                style="font-size:0.7rem; background:transparent; border:1px solid var(--border);
                       color:var(--fg2); padding:2px 8px; border-radius:3px; cursor:pointer;">
          🔄 <span data-i18n="qg_refresh">更新</span>
        </button>
      </label>
      <!-- SONG_DROPDOWN_V1 -->
      <select id="qgSong" disabled>
        <option value="" disabled selected data-i18n="qg_pick_song">先選團體</option>
      </select>
      <input type="text" id="qgSongCustom" placeholder="或自訂輸入..." data-i18n-placeholder="qg_song_custom_ph" style="margin-top:6px; display:none;">
    </div>
    <button class="btn primary quick-go" onclick="quickGenerate()" id="btnQuickGen" data-i18n="qg_btn">一鍵生成</button>
    <!-- TASK_CANCEL_V1 -->
    <button class="btn" id="btnCancel" style="display:none;background:#e04040;color:#fff" onclick="cancelTask()">暫停</button>
  </div>
</div>

<div class="main">
  <!-- LEFT: Video list -->
  <div class="panel left">
    <div class="panel-title" data-i18n="video_list">影片列表</div>
    <div class="video-list" id="videoList">
      <div style="padding:24px;text-align:center;color:var(--fg2)" data-i18n="no_videos">
        尚無影片。請上傳或搜尋新增。
      </div>
    </div>
    <div class="btn-row">
      <label class="btn" style="margin:0">
        <input type="file" accept="video/*" multiple hidden id="fileInput">
        <span data-i18n="upload">+ 上傳</span>
      </label>
      <button class="btn" onclick="openSearchModal()" data-i18n="search_online">線上搜尋</button>
      <button class="btn danger" onclick="clearAll()" data-i18n="clear_all">全部清除</button>
    </div>
  </div>

  <!-- RIGHT: Settings -->
  <div class="panel right">
    <div class="panel-title" data-i18n="settings">設定</div>

    <!-- Reference face -->
    <div class="setting-group">
      <label data-i18n="ref_face">參考人臉（過濾影片）</label>
      <div class="inline-row">
        <input type="text" id="faceName" placeholder="人物名稱..." data-i18n-placeholder="face_name_ph">
        <button class="btn" onclick="searchFace()" id="btnFaceSearch" data-i18n="search">搜尋</button>
      </div>
      <div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap">
        <label class="btn" style="display:inline-block;font-size:0.8rem;padding:4px 10px">
          <input type="file" accept="image/*" hidden id="faceFileInput">
          <span data-i18n="browse_local">瀏覽本機</span>
        </label>
        <button class="btn" style="font-size:0.8rem;padding:4px 10px" onclick="detectFacesFromVideos()" data-i18n="detect_from_video">從影片偵測</button>
        <button class="btn" style="font-size:0.8rem;padding:4px 10px" onclick="clearFace()" data-i18n="clear">清除</button>
      </div>
      <div class="face-status" id="faceStatus" data-i18n="face_not_set">未設定（不過濾）</div>
    </div>

    <div class="separator"></div>

    <!-- Audio source -->
    <div class="setting-group">
      <label data-i18n="audio_source">音訊來源</label>
      <select id="audioSource"></select>
    </div>
    <div class="setting-group">
      <label data-i18n="search_song">搜尋歌曲音訊</label>
      <div class="inline-row">
        <input type="text" id="songQuery" placeholder="歌曲名稱..." data-i18n-placeholder="song_name_ph">
        <button class="btn" onclick="searchAudio()" id="btnAudioSearch" data-i18n="download">下載</button>
      </div>
      <label class="btn" style="display:inline-block;font-size:0.8rem;padding:4px 10px;margin-top:4px">
        <input type="file" accept="audio/*" hidden id="audioFileInput">
        <span data-i18n="browse_local_audio">瀏覽本機音訊</span>
      </label>
      <div class="face-status" id="audioStatus"></div>
    </div>

    <div class="separator"></div>

    <!-- Parameters -->
    <div class="setting-group">
      <label data-i18n="min_seg">最短片段（秒）</label>
      <div class="range-row">
        <input type="range" id="minDur" min="0.5" max="10" step="0.5" value="3.0">
        <span class="range-val" id="minDurVal">3.0</span>
      </div>
    </div>
    <div class="setting-group">
      <label data-i18n="max_seg">最長片段（秒）</label>
      <div class="range-row">
        <input type="range" id="maxDur" min="1" max="20" step="0.5" value="8.0">
        <span class="range-val" id="maxDurVal">8.0</span>
      </div>
    </div>
    <div class="setting-group">
      <label data-i18n="pose_thresh">姿勢相似度門檻</label>
      <div class="range-row">
        <input type="range" id="simThresh" min="0" max="1" step="0.05" value="0.3">
        <span class="range-val" id="simThreshVal">0.30</span>
      </div>
    </div>

    <div class="separator"></div>

    <div class="setting-group">
      <label><input type="checkbox" id="smartCrop" checked> <span data-i18n="smart_crop">智慧裁切 16:9 轉 9:16（追蹤人物）</span></label>
    </div>
    <div class="setting-group">
      <label data-i18n="crossfade">淡入淡出（秒）</label>
      <div class="range-row">
        <input type="range" id="crossfade" min="0" max="0.5" step="0.05" value="0.2">
        <span class="range-val" id="crossfadeVal">0.20</span>
      </div>
    </div>
    <div class="setting-group">
      <label data-i18n="output_res">輸出解析度</label>
      <select id="resolution">
        <option value="1080x1920">1080x1920（直式）</option>
        <option value="720x1280">720x1280（直式）</option>
        <option value="1920x1080">1920x1080（橫式）</option>
        <option value="1280x720">1280x720（橫式）</option>
      </select>
    </div>
  </div>
</div>

<!-- Bottom: Timeline + Progress + Controls -->
<div class="bottom">
  <div class="timeline-wrap">
    <div class="panel-title" style="border:none;margin:0;padding:0 0 6px" data-i18n="timeline">轉場時間軸</div>
    <div class="timeline-bar" id="timeline">
      <div style="padding:10px;color:var(--fg2);font-size:0.8rem;width:100%;text-align:center" data-i18n="run_analysis">
        執行分析以查看時間軸
      </div>
    </div>
    <div class="tl-label" id="tlLabel"></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="status-text" id="statusText" data-i18n="ready">就緒</div>
    <!-- PHASE_PANEL_V1 -->
    <div id="phasePanel" style="display:none;margin-top:6px;padding:8px 10px;
         background:rgba(0,0,0,0.28);border-radius:6px;
         font-family:ui-monospace,Menlo,Consolas,monospace;
         font-size:12px;line-height:1.55;color:#d8e0ea;max-height:180px;
         overflow-y:auto">
      <div id="phaseHeader" style="color:#9cc4ff;margin-bottom:4px">
        ⏱ <span id="phaseElapsed">00:00</span>
      </div>
      <div id="phaseList"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn primary" onclick="runAnalysis()" id="btnAnalyze" data-i18n="analyze">分析影片</button>
    <button class="btn" onclick="runReplan()" id="btnReplan" disabled data-i18n="replan">重新規劃</button>
    <button class="btn primary" onclick="runRender()" id="btnRender" disabled data-i18n="generate">產生混搭</button>
  </div>


  <div class="output-preview" id="outputPreview" style="display:none">
    <!-- PANEL_DOCK_V1 -->
    <div class="output-flex">
      <div class="output-video-col">
        <video controls id="outputVideo"></video>
        <div style="margin-top:8px">
          <a id="outputDownload" class="btn primary" download data-i18n="download_output">下載成品</a>
        </div>
        <!-- TIKTOK_CLIPS_UI_V1 -->
        <div id="tiktokClips" class="tiktok-clips" style="margin-top:10px"></div>
      </div>
      <div class="swap-panel" id="swapPanel">
          <button class="close" onclick="closeSwapPanel()">×</button>
          <h4 id="swapTitle">Segment</h4>
          <div class="sub" id="swapSub"></div>
          <!-- THREE_COL_V1 -->
          <div class="swap-panel-body">
            <div class="swap-preview-col">
              <video class="swap-preview" id="swapPreview" muted playsinline></video>
            </div>
            <div class="swap-cands-col">
              <div id="swapCands"></div>
              <div class="actions swap-actions-row">
                <button class="btn primary" id="swapApplyAllBtn" onclick="applyAllSwaps()"
                        data-i18n="swap_apply_all">全部套用 (0)</button>
                <button class="btn" id="swapClearBtn" onclick="clearSwapQueue()"
                        data-i18n="swap_clear">清除佇列</button>
              </div>
            </div>
          </div>
        </div>
    </div>
  </div>
</div>

<!-- Search Modal -->
<div class="modal-overlay" id="searchModal">
  <div class="modal">
    <div class="modal-header">
      <h2 data-i18n="search_online_videos">搜尋線上影片</h2>
      <button class="modal-close" onclick="closeSearchModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="inline-row">
        <input type="text" id="searchQuery" placeholder="歌曲名稱或關鍵字..." data-i18n-placeholder="search_kw_ph" style="flex:1;padding:8px;background:#111;border:1px solid var(--border);border-radius:4px;color:var(--fg)">
        <select id="searchPlatform" style="padding:8px;background:#111;border:1px solid var(--border);border-radius:4px;color:var(--fg)">
          <option value="youtube">YouTube</option>
          <option value="bilibili">Bilibili</option>
        </select>
        <button class="btn primary" onclick="doSearch()" id="btnSearch" data-i18n="search">搜尋</button>
      </div>
      <ul class="search-results" id="searchResults"></ul>
    </div>
    <div class="modal-footer">
      <div class="inline-row">
        <button class="btn primary" onclick="doDownload()" id="btnDownload" disabled data-i18n="download_selected">下載選取項目</button>
        <button class="btn" onclick="closeSearchModal()" data-i18n="close">關閉</button>
        <span class="face-status" id="searchStatus" style="margin-left:auto"></span>
      </div>
    </div>
  </div>
</div>

<!-- Face Picker Modal -->
<div class="modal-overlay" id="faceModal">
  <div class="modal">
    <div class="modal-header">
      <h2 data-i18n="select_face">選擇目標人物</h2>
      <button class="modal-close" onclick="closeFaceModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="face-status" id="faceDetectStatus" data-i18n="detecting_faces">正在從影片偵測人臉...</div>
      <div class="face-grid" id="faceGrid"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeFaceModal()" data-i18n="cancel">取消</button>
    </div>
  </div>
</div>

<script>
// ── i18n ──
const LANG = {
  zh: {
    subtitle: '匯入多個舞蹈影片，自動卡拍剪輯混搭',
    qg_person: '人物名稱', qg_song: '曲目名稱', qg_btn: '一鍵生成',
    qg_person_ph: '例如: YUNA', qg_song_ph: '例如: Ice Cream', qg_refresh: '更新', qg_refresh_title: '從 iTunes 重新抓取最新曲目', qg_pick_song: '先選團體', qg_song_custom_ph: '或自訂輸入...',
    video_list: '影片列表', no_videos: '尚無影片。請上傳或搜尋新增。',
    upload: '+ 上傳', search_online: '線上搜尋', clear_all: '全部清除',
    settings: '設定', ref_face: '參考人臉（過濾影片）',
    face_name_ph: '人物名稱...', search: '搜尋',
    browse_local: '瀏覽本機', detect_from_video: '從影片偵測', clear: '清除',
    face_not_set: '未設定（不過濾）',
    audio_source: '音訊來源', search_song: '搜尋歌曲音訊',
    song_name_ph: '歌曲名稱...', download: '下載',
    browse_local_audio: '瀏覽本機音訊',
    min_seg: '最短片段（秒）', max_seg: '最長片段（秒）',
    pose_thresh: '姿勢相似度門檻',
    smart_crop: '智慧裁切 16:9 轉 9:16（追蹤人物）',
    crossfade: '淡入淡出（秒）', output_res: '輸出解析度',
    timeline: '轉場時間軸', run_analysis: '執行分析以查看時間軸',
    ready: '就緒', analyze: '分析影片', replan: '重新規劃', generate: '產生混搭',
    download_output: '下載成品',
    search_online_videos: '搜尋線上影片', search_kw_ph: '歌曲名稱或關鍵字...',
    download_selected: '下載選取項目', close: '關閉', cancel: '取消',
    select_face: '選擇目標人物', detecting_faces: '正在從影片偵測人臉...',
    click_to_select: '點擊選擇此人作為參考',
    face_set: '已設定參考人臉', face_search_ing: '搜尋中...',
    res_portrait: '（直式）', res_landscape: '（橫式）',
    found_faces: '偵測到 {n} 個不同人物，請點擊選擇目標：',
    no_faces: '未偵測到人臉，請先新增影片。',
    generating: '生成中...',
  },
  en: {
    subtitle: 'Import multiple dance videos, auto-cut on beats to create mashups',
    qg_person: 'Person Name', qg_song: 'Song Title', qg_btn: 'Quick Generate',
    qg_person_ph: 'e.g. YUNA', qg_song_ph: 'e.g. Ice Cream', qg_refresh: 'Refresh', qg_refresh_title: 'Re-scrape iTunes for newest releases', qg_pick_song: 'Pick group first', qg_song_custom_ph: 'Or type a custom title...',
    video_list: 'Video List', no_videos: 'No videos yet. Upload or search to add.',
    upload: '+ Upload', search_online: 'Search Online', clear_all: 'Clear All',
    settings: 'Settings', ref_face: 'Reference Face (filter videos)',
    face_name_ph: 'Person name...', search: 'Search',
    browse_local: 'Browse Local', detect_from_video: 'Detect from Video', clear: 'Clear',
    face_not_set: 'Not set (no filtering)',
    audio_source: 'Audio Source', search_song: 'Search Song Audio',
    song_name_ph: 'Song name...', download: 'Download',
    browse_local_audio: 'Browse Local Audio',
    min_seg: 'Min Segment (sec)', max_seg: 'Max Segment (sec)',
    pose_thresh: 'Pose Similarity Threshold',
    smart_crop: 'Smart Crop 16:9 to 9:16 (follow person)',
    crossfade: 'Crossfade (sec)', output_res: 'Output Resolution',
    timeline: 'Transition Timeline', run_analysis: 'Run analysis to see timeline',
    ready: 'Ready', analyze: 'Analyze Videos', replan: 'Replan', generate: 'Generate Mashup',
    download_output: 'Download Output',
    search_online_videos: 'Search Online Videos', search_kw_ph: 'Song name or keywords...',
    download_selected: 'Download Selected', close: 'Close', cancel: 'Cancel',
    select_face: 'Select Target Person', detecting_faces: 'Detecting faces from videos...',
    click_to_select: 'Click to select as reference',
    face_set: 'Reference face set', face_search_ing: 'Searching...',
    res_portrait: ' (Portrait)', res_landscape: ' (Landscape)',
    found_faces: 'Found {n} distinct persons. Click to select:',
    no_faces: 'No faces detected. Please add videos first.',
    generating: 'Generating...',
  }
};

let currentLang = 'zh';

function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  document.getElementById('btnLang').textContent = currentLang === 'zh' ? 'EN' : '中文';
  applyLang();
}

function t(key, vars) {
  let s = LANG[currentLang][key] || LANG['zh'][key] || key;
  if (vars) {
    for (const [k, v] of Object.entries(vars)) s = s.replace(`{${k}}`, v);
  }
  return s;
}

function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') return;
    el.textContent = t(key);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
  });
  // Update resolution dropdown text
  const res = document.getElementById('resolution');
  const opts = res.options;
  opts[0].text = '1080x1920' + t('res_portrait');
  opts[1].text = '720x1280' + t('res_portrait');
  opts[2].text = '1920x1080' + t('res_landscape');
  opts[3].text = '1280x720' + t('res_landscape');
}

// ── State ──
let searchResultsData = [];
let faceCandidates = [];

// PHASE_PANEL_V1 — live timer + phase history
let _phaseState = { phases: [], startedAt: 0, active: false };
function _fmtDur(sec) {
  sec = Math.max(0, Math.round(sec));
  const m = Math.floor(sec / 60), s = sec % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
function _renderPhasePanel() {
  const panel = document.getElementById('phasePanel');
  if (!panel) return;
  const { phases, startedAt, active } = _phaseState;
  const hasAny = (phases && phases.length) || active;
  panel.style.display = hasAny ? 'block' : 'none';
  if (!hasAny) return;
  const now = Date.now() / 1000;
  const elapsed = startedAt > 0 ? (now - startedAt) : 0;
  document.getElementById('phaseElapsed').textContent = _fmtDur(elapsed);
  // PHASE_PANEL_V2 — active phase(s) first, then completed in reverse order
  const _sorted = (phases || []).slice().sort((a, b) => {
    const aActive = !a.t1, bActive = !b.t1;
    if (aActive !== bActive) return aActive ? -1 : 1;
    return (b.t0 || 0) - (a.t0 || 0);
  });
  const rows = _sorted.map(p => {
    const end = p.t1 || now;
    const d = _fmtDur(end - p.t0);
    const icon = p.t1 ? '✓' : '▶';
    const color = p.t1 ? '#88c088' : '#ffd060';
    return `<div style="color:${color}">${icon} ${_escapeHtml(p.name)}  <span style="color:#8a98a8">${d}</span></div>`;
  }).join('');
  document.getElementById('phaseList').innerHTML = rows;
}
function _escapeHtml(x) {
  return String(x).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c]);
}
setInterval(() => { if (_phaseState.active) _renderPhasePanel(); }, 1000);

// Restore task state on page load (reconnection support)
(async function restoreTaskState() {
  try {
    const r = await fetch('/api/task_status');
    const st = await r.json();
    if (st.active || st.progress > 0) {
      document.getElementById('progressFill').style.width = (st.progress * 100) + '%';
      if (st.text) document.getElementById('statusText').textContent = st.text;
      if (st.active) {
        document.getElementById('btnQuickGen').disabled = true;

    }
    // PHASE_PANEL_V1 — seed phase panel
    _phaseState.phases    = st.phases || [];
    _phaseState.startedAt = st.started_at || 0;
    _phaseState.active    = !!st.active;
    _renderPhasePanel();
    if (st.result) {
      if (st.result.event === 'render_done' && st.result.data.filename) {
        showOutput(st.result.data.filename);
        loadPlanForMashup(st.result.data.filename);
      } else if (st.result.event === 'error_event') {
        document.getElementById('statusText').textContent = st.result.data.text || 'Error';

})();

  document.getElementById('searchStatus').textContent = currentLang === 'zh' ? '搜尋中...' : 'Searching...';

async function populateSongDropdown(group) {
  const sel = document.getElementById('qgSong');
  if (!sel) return;
  sel.innerHTML = '<option value="" disabled selected>' +
    (currentLang==='zh' ? '載入中...' : 'Loading...') + '</option>';
  sel.disabled = true;
  if (!group) {
    sel.innerHTML = '<option value="" disabled selected>' +
      (currentLang==='zh' ? '先選團體' : 'Pick group first') + '</option>';
    return;
  }
  let data = null;
  try {
    const r = await fetch('/api/songs?group=' + encodeURIComponent(group));
    if (r.ok) { const d = await r.json(); data = d.data || null; }
  } catch(e) { console.warn('songs fetch failed', e); }
  sel.innerHTML = '';
  const ph = document.createElement('option');
  ph.value = ''; ph.disabled = true; ph.selected = true;
  ph.textContent = (currentLang==='zh' ? '選擇曲目' : 'Pick song');
  sel.appendChild(ph);

  const seen = new Set();
  const addBucket = (label, releases) => {
    if (!releases || !releases.length) return;
    for (const rel of releases) {
      const og = document.createElement('optgroup');
      const y = rel.year ? ` (${rel.year})` : '';
      og.label = `${label} · ${rel.name}${y}`;
      for (const t of (rel.tracks || [])) {
        const key = (t || '').toLowerCase().trim();
        if (!key || seen.has(key)) continue;
        seen.add(key);
        const o = document.createElement('option');
        o.value = t; o.textContent = t;
        og.appendChild(o);
      }
      if (og.children.length) sel.appendChild(og);
    }
  };
  const labels = currentLang === 'zh'
    ? { albums: '正規專輯', mini_albums: '迷你專輯', singles: '單曲' }
    : { albums: 'Studio Album', mini_albums: 'Mini Album', singles: 'Single' };
  if (data) {
    addBucket(labels.albums,      data.albums);
    addBucket(labels.mini_albums, data.mini_albums);
    addBucket(labels.singles,     data.singles);
  }
  // always add custom option at end
  const custom = document.createElement('option');
  custom.value = '__custom__';
  custom.textContent = currentLang==='zh' ? '▸ 自訂輸入...' : '▸ Custom title...';
  sel.appendChild(custom);
  sel.disabled = false;

  sel.onchange = () => {
    const custIn = document.getElementById('qgSongCustom');
    if (sel.value === '__custom__') {
      if (custIn) { custIn.style.display = ''; custIn.focus(); }
    } else if (custIn) {
      custIn.style.display = 'none';
    }
  };
}

window.timelineColors = ['#e57373','#64b5f6','#81c784','#ffd54f','#ba68c8','#4db6ac','#ffb74d','#9575cd'];

async function refreshTimeline() {
  const r = await fetch('/api/segments');
  const d = await r.json();
  const bar = document.getElementById('timeline');
  const label = document.getElementById('tlLabel');
  if (!d.segments.length) {
    bar.innerHTML = `<div style="padding:10px;color:var(--fg2);font-size:0.8rem;width:100%;text-align:center">${t('run_analysis')}</div>`;
    label.textContent = '';
    return;
  }
  renderTimelineFromSegments(d.segments, d.total_duration, d.colors, /*fromPlan*/false);
  label.textContent = `${d.segments.length} ${currentLang === 'zh' ? '段' : 'segments'}, ${d.total_duration.toFixed(1)}s`;
}

function renderTimelineFromSegments(segs, total, colors, fromPlan) {
  const bar = document.getElementById('timeline');
  bar.innerHTML = segs.map((s, i) => {
    const start = fromPlan ? s.t_start : s.start;
    const end   = fromPlan ? s.t_end   : s.end;
    const vi    = s.video_idx;
    const sim   = s.similarity || 0;
    const pct   = ((end - start) / total * 100).toFixed(2);
    const col   = (colors && colors[vi]) || window.timelineColors[vi % window.timelineColors.length];
    return `<div class="timeline-seg" data-seg-idx="${i}" data-vi="${vi}"
                 style="width:${pct}%;background:${col}"
                 title="#${i} V${vi+1} ${start.toFixed(1)}-${end.toFixed(1)}s sim=${sim.toFixed(2)}"
                 onclick="openSwapPanel(${i})">
              ${pct > 3 ? 'V' + (vi+1) : ''}
            </div>`;
  }).join('');
}

async function loadPlanForMashup(filename) {
  window.currentMashup = filename;
  window.currentPlan = null;
  try {
    const r = await fetch('/api/plan/' + encodeURIComponent(filename));
    if (!r.ok) return;
    const plan = await r.json();
    window.currentPlan = plan;
    // Compute total from max t_end
    let total = plan.duration || 0;
    if (!total && plan.segments.length) total = plan.segments[plan.segments.length-1].t_end;
    renderTimelineFromSegments(plan.segments, total, null, true);
    const label = document.getElementById('tlLabel');
    label.textContent = `${plan.segments.length} ${currentLang === 'zh' ? '段' : 'segments'}, ${total.toFixed(1)}s ` +
                        `${currentLang === 'zh' ? '(點段落換片)' : '(click segment to swap)'}`;
    wireTimelinePlayback();
    // Always-on panel: open for segment 0 as starting state.
    _buildSwapPanel(0);
  } catch(e) { console.warn('plan load failed', e); }
}

function wireTimelinePlayback() {
  const video = document.getElementById('outputVideo');
  if (!video || video._wired) return;
  video._wired = true;
  const _advance = () => {
    if (!window.currentPlan) return;
    const t = video.currentTime;
    const segs = window.currentPlan.segments;
    let idx = segs.findIndex(s => t >= s.t_start && t < s.t_end);
    if (idx < 0) idx = segs.length - 1;
    document.querySelectorAll('.timeline-seg').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.segIdx) === idx);
    });
    if (idx !== window.currentPanelSegIdx) {
      _buildSwapPanel(idx);
    }
  };
  video.addEventListener('timeupdate', _advance);
  video.addEventListener('seeked', _advance);
  video.addEventListener('loadedmetadata', _advance);
}

function visibilityHeatmap(vis, t0, t1, sim_thresh) {
  // vis: array of [t, sim]. Render ~20 cells over [t0, t1].
  if (!vis || !vis.length) return '<div class="heatmap"><div class="cell" style="background:#333"></div></div>';
  const N = 20;
  const cells = [];
  for (let i = 0; i < N; i++) {
    const ct = t0 + (t1 - t0) * (i + 0.5) / N;
    let best = 0;
    for (const [st, s] of vis) {
      if (Math.abs(st - ct) <= 0.8 && s > best) best = s;
    }
    // Map sim to color: <0.3 dark, >=0.5 bright green
    let bg = '#333';
    if (best >= 0.55) bg = '#2e7d32';
    else if (best >= 0.45) bg = '#66bb6a';
    else if (best >= 0.35) bg = '#a5d6a7';
    else if (best >= 0.25) bg = '#555';
    cells.push(`<div class="cell" style="background:${bg}" title="t=${ct.toFixed(1)}s sim=${best.toFixed(2)}"></div>`);
  }
  return `<div class="heatmap">${cells.join('')}</div>`;
}

// STICKY_SWAP_PANEL_V1
function openSwapPanel(segIdx) {
  // Click from timeline: seek and rebuild panel for that segment.
  const plan = window.currentPlan;
  if (!plan) { alert(currentLang==='zh'?'此成品無 plan.json,請重跑':'No plan for this mashup'); return; }
  const seg = plan.segments[segIdx];
  if (!seg) return;
  const vid = document.getElementById('outputVideo');
  if (vid && !isNaN(vid.duration)) { vid.currentTime = seg.t_start; }
  _buildSwapPanel(segIdx);
}

function _buildSwapPanel(segIdx) {
  const plan = window.currentPlan;
  if (!plan) return;
  const seg = plan.segments[segIdx];
  if (!seg) return;

  // The selected candidate for this seg = queued override if any, else current.
  const queuedVi = (window.pendingSwaps || {})[segIdx];
  const selVi = (queuedVi != null) ? queuedVi : seg.video_idx;
  window.pendingSwap = { seg_idx: segIdx, video_idx: selVi };  // legacy mirror
  window.currentPanelSegIdx = segIdx;

  document.getElementById('swapTitle').textContent =
    `#${segIdx} — V${seg.video_idx+1}`;
  document.getElementById('swapSub').textContent =
    `${seg.t_start.toFixed(1)}s - ${seg.t_end.toFixed(1)}s ` +
    `(sim=${(seg.similarity||0).toFixed(2)})`;

  // Build candidate rows: include current + candidates + any missing videos
  const seen = new Set();
  const rows = [];
  const curCand = { video_idx: seg.video_idx, score: seg.similarity || 0 };
  [curCand, ...(seg.candidates || [])].forEach(c => {
    if (!seen.has(c.video_idx)) { seen.add(c.video_idx); rows.push(c); }
  });
  plan.videos.forEach(v => {
    if (!seen.has(v.idx)) { seen.add(v.idx); rows.push({ video_idx: v.idx, score: 0 }); }
  });

  const cont = document.getElementById('swapCands');
  const audioOff = plan.audio_offsets || {};
  cont.innerHTML = rows.map(c => {
    const vi = c.video_idx;
    const v  = plan.videos.find(x => x.idx === vi);
    const vname = v ? (v.filename || ('V'+(vi+1))).slice(0, 28) : ('V'+(vi+1));
    const off = parseFloat(audioOff[String(vi)] || 0);
    const t0 = seg.t_start + off, t1 = seg.t_end + off;
    const vis = (plan.face_visibility || {})[String(vi)] || [];
    const isCur = vi === seg.video_idx;
    const col = window.timelineColors[vi % window.timelineColors.length];
    const isQueued = (window.pendingSwaps || {})[segIdx] === vi;
    const isSel    = (vi === selVi);
    return `<div class="swap-cand ${isCur?'current':''} ${isSel?'selected':''} ${isQueued?'queued':''}"
                 data-vi="${vi}" onclick="selectSwapCand(${vi})">
      <div class="row1">
        <span class="vname"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${col};margin-right:6px;vertical-align:middle"></span>V${vi+1} · ${vname}${isCur?' ★':''}</span>
        <span class="score">${c.score>0 ? 'score='+c.score.toFixed(2) : ''}</span>
      </div>
      ${visibilityHeatmap(vis, t0, t1)}
    </div>`;
  }).join('');

  document.getElementById('swapPanel').classList.add('show');
  // Highlight segments on timeline: active for current, queued for pending.
  refreshTimelineQueueMarks();
  document.querySelectorAll('.timeline-seg').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.segIdx) === segIdx);
  });
  updateApplyAllButton();
  // Start preview of the selected candidate for this segment.
  playCandidatePreview(selVi, segIdx);
}

function selectSwapCand(vi) {
  const plan = window.currentPlan;
  const segIdx = window.currentPanelSegIdx;
  if (!plan || segIdx == null) return;
  const seg = plan.segments[segIdx];
  if (!seg) return;

  // Queue / unqueue: if vi matches the plan's current, drop the override.
  window.pendingSwaps = window.pendingSwaps || {};
  if (vi === seg.video_idx) {
    delete window.pendingSwaps[segIdx];
  } else {
    window.pendingSwaps[segIdx] = vi;
  }
  if (window.pendingSwap) window.pendingSwap.video_idx = vi;

  // Update candidate row classes (.selected on picked, .queued on overrides).
  document.querySelectorAll('.swap-cand').forEach(el => {
    const v = parseInt(el.dataset.vi);
    el.classList.toggle('selected', v === vi);
    el.classList.toggle('queued', window.pendingSwaps[segIdx] === v);
  });

  // Pause output video so time doesn't advance past this segment.
  const outv = document.getElementById('outputVideo');
  if (outv && !outv.paused) { try { outv.pause(); } catch(e) {} }

  refreshTimelineQueueMarks();
  updateApplyAllButton();
  playCandidatePreview(vi, segIdx);
}

function closeSwapPanel() {
  // Reset just this segment's queued swap (doesn't touch others in queue).
  const si = window.currentPanelSegIdx;
  if (si != null && window.pendingSwaps) {
    delete window.pendingSwaps[si];
    _buildSwapPanel(si);
  }
  if (!window.currentPlan) {
    document.getElementById('swapPanel').classList.remove('show');
  }
}

function refreshTimelineQueueMarks() {
  const q = window.pendingSwaps || {};
  document.querySelectorAll('.timeline-seg').forEach(el => {
    el.classList.toggle('queued', q[parseInt(el.dataset.segIdx)] != null);
  });
}

function updateApplyAllButton() {
  const btn = document.getElementById('swapApplyAllBtn');
  if (!btn) return;
  const q = window.pendingSwaps || {};
  const n = Object.keys(q).length;
  const label = currentLang==='zh' ? `\u5168\u90e8\u5957\u7528 (${n})` : `Apply All (${n})`;
  btn.textContent = label;
  btn.disabled = (n === 0);
}

function clearSwapQueue() {
  window.pendingSwaps = {};
  refreshTimelineQueueMarks();
  updateApplyAllButton();
  if (window.currentPanelSegIdx != null) _buildSwapPanel(window.currentPanelSegIdx);
}

async function applyAllSwaps() {
  if (!window.currentMashup) return;
  const q = window.pendingSwaps || {};
  const swaps = Object.entries(q).map(([seg_idx, video_idx]) => ({
    seg_idx: parseInt(seg_idx), video_idx: parseInt(video_idx),
  }));
  if (!swaps.length) return;

  const btn = document.getElementById('swapApplyAllBtn');
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = currentLang==='zh' ? '\u91cd\u65b0\u5408\u6210\u4e2d...' : 'Rendering...';
  try {
    const r = await fetch('/api/swap_segment', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ mashup: window.currentMashup, swaps: swaps }),
    });
    const d = await r.json();
    if (!r.ok) { alert('Swap failed: ' + (d.error || r.statusText)); btn.textContent = orig; btn.disabled = false; return; }
    document.getElementById('statusText').textContent =
      (currentLang==='zh' ? `\u63db\u7247\u91cd\u65b0\u5408\u6210\u4e2d (${swaps.length} \u6bb5): ` : `Swap rendering (${swaps.length} segs): `) + d.filename;
    // Clear local queue; render_done event will load the new plan.
    window.pendingSwaps = {};
    refreshTimelineQueueMarks();
  } catch(e) {
    alert('Swap request failed: ' + e);
    btn.textContent = orig;
    btn.disabled = false;
  }
}

// --- Candidate preview ---
let _previewStopT = -1;
function playCandidatePreview(vi, segIdx) {
  const plan = window.currentPlan;
  const prev = document.getElementById('swapPreview');
  if (!plan || !prev) return;
  const seg = plan.segments[segIdx];
  const v = plan.videos && plan.videos.find(x => x.idx === vi);
  if (!seg || !v || !v.filename) { prev.classList.remove('show'); prev.removeAttribute('src'); return; }

  const off = parseFloat((plan.audio_offsets || {})[String(vi)] || 0);
  const t0 = Math.max(0, seg.t_start + off);
  const t1 = seg.t_end + off;

  const wantSrc = '/downloads/' + encodeURIComponent(v.filename);
  if (prev.getAttribute('src') !== wantSrc) {
    prev.src = wantSrc;
    prev.load();
  }
  prev.classList.add('show');
  _previewStopT = t1;

  const seekAndPlay = () => {
    try { prev.currentTime = t0; } catch(e) {}
    prev.play().catch(()=>{});
  };
  if (prev.readyState >= 1) seekAndPlay();
  else prev.addEventListener('loadedmetadata', seekAndPlay, { once: true });

  // Stop at segment end (handler already bound on first call).
  if (!prev._stopBound) {
    prev.addEventListener('timeupdate', () => {
      if (_previewStopT > 0 && prev.currentTime >= _previewStopT) {
        try { prev.pause(); } catch(e) {}
      }
    });
    prev._stopBound = true;
  }
}

// ── Output ──
function showOutput(filename) {
  const preview = document.getElementById('outputPreview');
  const video = document.getElementById('outputVideo');
  const dl = document.getElementById('outputDownload');
  const url = '/output/' + encodeURIComponent(filename);
  video.src = url;
  dl.href = url;
  dl.download = filename;
  preview.style.display = 'block';
  refreshTiktokClips(filename);
  video.scrollIntoView({ behavior: 'smooth' });
}


// TIKTOK_CLIPS_UI_V1 — list sliced clips next to the main output.
async function refreshTiktokClips(filename) {
  const host = document.getElementById('tiktokClips');
  if (!host || !filename) return;
  try {
    const r = await fetch('/api/tiktok_clips/' + encodeURIComponent(filename));
    const j = await r.json();
    const clips = j.clips || [];
    if (!clips.length) { host.innerHTML = ''; return; }
    host.innerHTML =
      '<div style="font-weight:600;margin-bottom:4px">TikTok 切片 (' + clips.length + ')</div>' +
      clips.map(c =>
        '<a class="btn" style="margin:2px 4px 2px 0" href="' + c.url +
        '" download="' + (c.download_as || c.name) + '">' +
        '#' + String(c.idx).padStart(2,'0') + ' · ' + c.seconds + 's · ' +
        c.size_mb + ' MB</a>'
      ).join('');
  } catch (e) { /* ignore */ }
}
evtSource.addEventListener('tiktok_done', e => {
  try {
    const d = JSON.parse(e.data);
    refreshTiktokClips(d.filename);
  } catch (_) {}
});


// TASK_CANCEL_V1 — 暫停/中止 button
async function cancelTask() {
  const btn = document.getElementById('btnCancel');
  if (btn) { btn.disabled = true; btn.textContent = '中止中...'; }
  try {
    await fetch('/api/cancel', { method: 'POST' });
  } catch (_) {}
  document.getElementById('statusText').textContent = '已中止';
  setTimeout(() => {
    if (btn) { btn.style.display = 'none'; btn.disabled = false; btn.textContent = '暫停'; }
  }, 600);
}
function _setTaskActiveUI(active) {
  const btn = document.getElementById('btnCancel');
  if (btn) btn.style.display = active ? 'inline-block' : 'none';
  const gen = document.getElementById('btnQuickGen');
  if (gen) gen.disabled = !!active;
  // PHASE_PANEL_V1 — stop the tick when task ends, keep panel visible as history
  _phaseState.active = !!active;
  _renderPhasePanel();
}
// Initial sync + whenever progress / done events fire
(async () => {
  try {
    const st = await (await fetch('/api/task_status')).json();
    _setTaskActiveUI(!!st.active);
  } catch (_) {}
})();
evtSource.addEventListener('progress', () => {
  // a progress tick implies active — but only show if value < 1
  try {
    // best-effort: stay active if status text isn't final
    const txt = document.getElementById('statusText').textContent || '';
    const done = /完成|已中止|failed|error/i.test(txt);
    _setTaskActiveUI(!done);
  } catch (_) {}
});
evtSource.addEventListener('render_done',  () => _setTaskActiveUI(false));
evtSource.addEventListener('error_event',  () => _setTaskActiveUI(false));
evtSource.addEventListener('tiktok_done',  () => _setTaskActiveUI(false));

// ── Init ──
refreshVideos();
refreshTimeline();
</script>
